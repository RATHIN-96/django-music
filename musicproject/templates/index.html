<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #1db954, #191414);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* MAIN */
.container {
    width: 350px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

/* UPLOAD BUTTON */
.upload-box {
    text-align: right;
    margin-bottom: 10px;
}

.upload-btn {
    color: white;
    text-decoration: none;
    background: linear-gradient(45deg, #1db954, #1ed760);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 14px;
    transition: 0.3s;
}

.upload-btn:hover {
    transform: scale(1.1);
}

/* COVER */
.cover {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    display: block;
    margin: auto;
    object-fit: cover;
    animation: spin 10s linear infinite;
    animation-play-state: paused;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* TITLE */
.title {
    text-align: center;
    margin: 15px 0;
    font-size: 20px;
    font-weight: bold;
    color: white;
}

/* PROGRESS */
.progress {
    width: 100%;
    accent-color: #1db954;
}

/* CONTROLS */
.controls {
    text-align: center;
    margin-top: 10px;
}

.controls button {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    font-size: 18px;
    margin: 10px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    cursor: pointer;
    transition: 0.3s;
}

.controls button:hover {
    background: #1db954;
    transform: scale(1.1);
}

.play-btn {
    width: 60px;
    height: 60px;
    background: #1db954;
}

/* PLAYLIST */
.playlist {
    margin-top: 20px;
    max-height: 200px;
    overflow-y: auto;
}

.song {
    display: flex;
    align-items: center;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.song:hover {
    background: rgba(255,255,255,0.1);
}

.song img {
    width: 50px;
    height: 50px;
    border-radius: 10px;
    margin-right: 10px;
}
</style>

</head>
<body>

<div class="container">

    <!-- 🔼 Upload Button -->
    <div class="upload-box">
        <a href="/upload/" class="upload-btn">➕ Upload</a>
    </div>

    <!-- 🎵 PLAYER -->
    <img id="cover" class="cover" src="">
    <div id="title" class="title">Select Song</div>

    <audio id="audio"></audio>

    <input type="range" id="progress" class="progress" value="0">

    <div class="controls">
        <button onclick="prevSong()">⏮</button>
        <button onclick="playPause()" id="playBtn" class="play-btn">▶</button>
        <button onclick="nextSong()">⏭</button>
    </div>

    <!-- 📜 PLAYLIST -->
    <div class="playlist">
        {% for song in songs %}
        <div class="song" onclick="playSong({{ forloop.counter0 }})">
            <img src="{{ song.cover.url }}">
            <span>{{ song.title }}</span>
        </div>
        {% endfor %}
    </div>

</div>

<script>
const songs = [
    {% for song in songs %}
    {
        title: "{{ song.title|escapejs }}",
        file: "{{ song.audio.url }}",
        cover: "{{ song.cover.url }}"
    },
    {% endfor %}
];

let currentSong = 0;

const audio = document.getElementById("audio");
const title = document.getElementById("title");
const cover = document.getElementById("cover");
const progress = document.getElementById("progress");
const playBtn = document.getElementById("playBtn");

/* LOAD SONG */
function loadSong(index) {
    audio.src = songs[index].file;
    title.innerText = songs[index].title;
    cover.src = songs[index].cover;
}

/* PLAY SELECT */
function playSong(index) {
    currentSong = index;
    loadSong(index);
    audio.play();
    playBtn.innerText = "⏸";
    cover.style.animationPlayState = "running";
}

/* PLAY / PAUSE */
function playPause() {
    if (audio.paused) {
        audio.play();
        playBtn.innerText = "⏸";
        cover.style.animationPlayState = "running";
    } else {
        audio.pause();
        playBtn.innerText = "▶";
        cover.style.animationPlayState = "paused";
    }
}

/* NEXT */
function nextSong() {
    currentSong = (currentSong + 1) % songs.length;
    playSong(currentSong);
}

/* PREVIOUS */
function prevSong() {
    currentSong = (currentSong - 1 + songs.length) % songs.length;
    playSong(currentSong);
}

/* PROGRESS */
audio.addEventListener("timeupdate", () => {
    if (audio.duration) {
        progress.value = (audio.currentTime / audio.duration) * 100;
    }
});

/* SEEK */
progress.addEventListener("input", () => {
    if (audio.duration) {
        audio.currentTime = (progress.value / 100) * audio.duration;
    }
});

/* AUTO NEXT */
audio.addEventListener("ended", nextSong);
</script>

</body>
</html>
